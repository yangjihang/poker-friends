services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poker}
      POSTGRES_DB: ${POSTGRES_DB:-poker}
    volumes:
      - poker-db:/var/lib/postgresql/data
    # 不映射宿主机端口，避免和宿主机上的其他 postgres 冲突。
    # 如需本地连 db 调试：docker compose exec db psql -U poker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poker}"]
      interval: 3s
      retries: 20

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://poker:poker@db:5432/poker}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      REGISTER_BONUS: ${REGISTER_BONUS:-20000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Admin}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    # 仅 docker 网络内可见，web 容器通过 backend:8000 反代访问。
    # 不对外映射 8000，避免和同机其他服务冲突（例如 chat-room 也用 8000）。
    expose:
      - "8000"

  web:
    build:
      context: ../frontend
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  poker-db:
